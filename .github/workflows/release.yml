name: Release

# Trigger on tags matching the project version format.
# Python package: use v[0-9]* (e.g. v0.1.0)
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify changelog exists
        shell: bash
        run: |
          CHANGELOG_FILE="docs/CHANGELOG/${{ steps.version.outputs.VERSION }}.md"
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "ERROR: $CHANGELOG_FILE not found."
            echo "Create a changelog entry before releasing."
            exit 1
          fi

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build VideoDownloader.exe
        run: python build_app.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          body_path: docs/CHANGELOG/${{ steps.version.outputs.VERSION }}.md
          draft: false
          prerelease: false
          files: dist/VideoDownloader.exe
