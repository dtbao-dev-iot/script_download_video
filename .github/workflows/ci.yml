name: Python CI

on:
  push:
    branches:
      - main
      - developing
  pull_request:
    branches:
      - main
      - developing

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Test (pytest)
  # ─────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run pytest
        run: |
          if [ -d "tests" ]; then
            pytest; code=$?
            if [ $code -eq 5 ]; then
              echo "No tests collected yet, skipping."
            elif [ $code -ne 0 ]; then
              exit $code
            fi
          else
            echo "No tests/ directory found. Skipping test step."
          fi
